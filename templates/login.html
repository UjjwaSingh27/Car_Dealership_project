{% extends "base.html" %}

{% block title %}Login - CarDeal{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
    <div class="col-md-5 col-lg-4">
        <div class="text-center mb-4">
            <div style="font-size:3rem; color:var(--primary-color)">
                <i class="bi bi-car-front-fill"></i>
            </div>
            <h2 style="font-family:var(--font-heading)" class="mt-2">Welcome Back</h2>
            <p class="text-muted">Sign in to your CarDeal account</p>
        </div>

        <div class="card p-4" style="border-radius:var(--radius); box-shadow:var(--shadow-md)">
            <form action="{{ url_for('auth.login') }}" method="POST">
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:var(--radius) 0 0 var(--radius)">
                            <i class="bi bi-person"></i>
                        </span>
                        <input type="text" class="form-control" name="username"
                               placeholder="Enter your username" required autofocus
                               style="border-radius:0 var(--radius) var(--radius) 0">
                    </div>
                </div>

                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text" style="border-radius:var(--radius) 0 0 var(--radius)">
                            <i class="bi bi-lock"></i>
                        </span>
                        <input type="password" class="form-control" name="password"
                               id="loginPassword" placeholder="Enter your password" required
                               style="border-radius:0">
                        <button class="btn btn-outline-secondary" type="button"
                                data-toggle-password="#loginPassword"
                                style="border-radius:0 var(--radius) var(--radius) 0">
                            <i class="bi bi-eye"></i>
                        </button>
                    </div>
                </div>

                <button type="submit" class="btn btn-primary w-100 py-2">
                    <i class="bi bi-box-arrow-in-right"></i> Sign In
                </button>
            </form>

            <hr class="my-3">
            <p class="text-center mb-0 small">
                Don't have an account?
                <a href="{{ url_for('auth.register') }}" class="fw-semibold">Register here</a>
            </p>
        </div>

        <!-- Demo accounts -->
        <div class="card mt-3 p-3" style="border-radius:var(--radius); background:rgba(26,86,219,0.05); border:1px solid rgba(26,86,219,0.15)">
            <p class="small mb-2 fw-semibold text-muted"><i class="bi bi-info-circle"></i> Demo Accounts</p>
            <div class="row g-2 small">
                <div class="col-6">
                    <div class="p-2 bg-white rounded" style="font-size:0.75rem; border:1px solid var(--border-color)">
                        <div class="fw-bold">Admin</div>
                        <code>Aadith_admin</code><br>
                        <code>adminPass123</code>
                    </div>
                </div>
                <div class="col-6">
                    <div class="p-2 bg-white rounded" style="font-size:0.75rem; border:1px solid var(--border-color)">
                        <div class="fw-bold">Customer</div>
                        <code>rahul_customer</code><br>
                        <code>custPass789</code>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
